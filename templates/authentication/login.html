<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocVault | Secure Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --electric:#6C63FF;
  --cyan:#00D4FF;
  --emerald:#00F5A0;
  --rose:#FF6B9D;
  --bg:#02040a;
  --text:#E2E8F0;
  --dim:#64748B;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;perspective:1000px;}
canvas#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── Floating Background Elements ── */
.floating-element {
    position: absolute;
    filter: blur(40px);
    border-radius: 50%;
    z-index: 0;
    opacity: 0.4;
    animation: float 20s infinite ease-in-out;
}
.shape1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(108,99,255,0.2); animation-delay: 0s; }
.shape2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(0,212,255,0.15); animation-delay: -5s; }
.shape3 { top: 40%; left: 40%; width: 30vw; height: 30vw; background: rgba(0,245,160,0.1); animation-delay: -10s; }

@keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
}

/* ── Layout ── */
.login-scene{
  position:relative;z-index:1;
  height:100vh;display:flex;align-items:center;justify-content:center;
  padding: 40px;
}

/* Right Panel — Form (3D Tilt Card) */
.login-right{
  width:100%; max-width: 480px;
  padding:50px 52px;
  background:rgba(6,9,20,.65);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
  transform-style: preserve-3d;
  transition: transform 0.1s ease;
  z-index: 10;
}

.form-header{margin-bottom:40px; transform: translateZ(30px);}
.form-header h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:2rem;font-weight:800;color:#fff;margin-bottom:12px;
  background: linear-gradient(135deg, #fff, var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.form-header p{font-size:.9rem;color:var(--dim); line-height:1.6;}

/* Floating Label Inputs */
.float-group{position:relative;margin-bottom:28px; transform: translateZ(40px);}
.float-group input{
  width:100%;padding:18px 16px 8px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;color:#fff;font-size:1rem;
  outline:none;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family:inherit;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
.float-group input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 4px rgba(0,212,255,.15), inset 0 2px 4px rgba(0,0,0,0.2);
  background:rgba(0,212,255,.05);
  transform: translateY(-2px);
}
.float-group input::placeholder{color:transparent;}
.float-group label{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--dim);font-size:.9rem;pointer-events:none;
  transition:.3s cubic-bezier(.4,0,.2,1);transform-origin:left;
}
.float-group input:focus+label,
.float-group input:not(:placeholder-shown)+label{
  top:12px;transform:translateY(0) scale(.75);color:var(--cyan);
}

/* Submit Button */
.btn-submit{
  width:100%;padding:16px;border-radius:14px;
  background:linear-gradient(135deg,var(--electric),var(--cyan));
  border:none;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:0 10px 30px var(--electric-glow);
  transition:all 0.4s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;gap:12px;
  font-family:inherit;
  transform: translateZ(50px);
}
.btn-submit::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-25deg); transition: 0.5s;
}
.btn-submit:hover{
    transform: translateZ(50px) translateY(-4px) scale(1.02);
    box-shadow:0 15px 40px rgba(0,212,255,0.4);
}
.btn-submit:hover::before { left: 150%; }
.btn-submit:active{transform: translateZ(50px) scale(.96);}
.btn-submit .spin-loader{display:none;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s cubic-bezier(0.5, 0, 0.5, 1) infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
.btn-submit.loading .btn-text{display:none;}
.btn-submit.loading .spin-loader{display:block;}

/* OTP Specific Animations */
.otp-box-anim {
  animation: pulseBox 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  text-shadow: 0 0 10px rgba(0,212,255,0.8);
}
@keyframes pulseBox {
  0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.5), inset 0 2px 4px rgba(0,0,0,0.2); }
  70% { box-shadow: 0 0 0 20px rgba(0, 212, 255, 0), inset 0 2px 4px rgba(0,0,0,0.2); }
  100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0), inset 0 2px 4px rgba(0,0,0,0.2); }
}

/* Error messages */
.alert-error{
  border-radius:12px;padding:14px 18px;
  font-size:.9rem;margin-bottom:24px;display:flex;align-items:center;gap:12px;
  transform: translateZ(20px);
  animation: slideInDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes slideInDown {
    from { opacity: 0; transform: translateZ(20px) translateY(-10px); }
    to { opacity: 1; transform: translateZ(20px) translateY(0); }
}

/* ── Cascade Entry Animations ── */
.stagger-1 { animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; opacity: 0; transform: translateY(30px); }
.stagger-2 { animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; transform: translateY(30px); }
.stagger-3 { animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; opacity: 0; transform: translateY(30px); }

@keyframes slideUpFade {
    to { opacity: 1; transform: translateY(0); }
}

.back-link {
    display: inline-block;
    margin-top: 24px;
    color: var(--dim);
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
    transform: translateZ(30px);
}
.back-link:hover { color: #fff; transform: translateZ(30px) translateX(-5px); }

</style>
</head>
<body>

<div class="floating-element shape1"></div>
<div class="floating-element shape2"></div>
<div class="floating-element shape3"></div>
<canvas id="bgCanvas"></canvas>

<div class="login-scene">
  <div class="login-right" id="tiltCard">
    <div class="form-header stagger-1">
      <h2>DocVault Login</h2>
      <p>Enter your username and password to securely access the workspace.</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert-error stagger-1" style="background:{% if message.tags == 'success' or message.tags == 'info' %}rgba(0,245,160,0.1){% else %}rgba(239,68,68,.08){% endif %}; border:1px solid {% if message.tags == 'success' or message.tags == 'info' %}rgba(0,245,160,0.3){% else %}rgba(239,68,68,.25){% endif %}; color:{% if message.tags == 'success' or message.tags == 'info' %}#00F5A0{% else %}#f87171{% endif %};">
      <i class="fas {% if message.tags == 'success' or message.tags == 'info' %}fa-check-circle{% else %}fa-circle-exclamation{% endif %} fa-lg"></i> {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST" id="loginForm">
      {% csrf_token %}

      <!-- USERNAME INPUT -->
      <div class="float-group stagger-2">
        <input type="text" name="username" id="usernameField" placeholder=" " autocomplete="username" required style="border-color: rgba(108, 99, 255, 0.4); background: rgba(108, 99, 255, 0.05);">
        <label>Username or Email</label>
      </div>

      <!-- PASSWORD INPUT -->
      <div class="float-group stagger-2" style="margin-bottom: 12px;">
        <input type="password" name="password" id="passwordField" placeholder=" " autocomplete="current-password" required style="border-color: rgba(0, 212, 255, 0.4); background: rgba(0, 212, 255, 0.05);">
        <label>Password</label>
      </div>

      <div class="stagger-2" style="text-align: right; margin-bottom: 24px;">
        <a href="{% url 'auth_forgot_password' %}" style="color:var(--cyan); font-size:0.85rem; text-decoration:none; font-weight:500;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-submit stagger-3" id="loginBtn">
        <span class="btn-text"><i class="fas fa-lock me-2"></i> Authenticate</span>
        <div class="spin-loader"></div>
      </button>

      <div class="stagger-3 text-center" style="margin-top: 24px;">
        <span style="color:var(--dim);font-size:0.9rem;">Don't have an account? <a href="{% url 'auth_register' %}" style="color:var(--cyan);text-decoration:none;font-weight:600;">Sign up</a></span>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/notifications.js"></script>

{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  {% for message in messages %}
  if (window.ToastEngine) {
    window.ToastEngine.show("{{ message|escapejs }}", "{{ message.tags|default:'' }}");
  }
  {% endfor %}
});
</script>
{% endif %}

<script>
/* ── 3D Tilt Effect on Card ── */
const card = document.getElementById('tiltCard');
document.addEventListener('mousemove', (e) => {
    let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
    let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});
// Reset on mouse leave window
document.addEventListener('mouseleave', () => {
    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    card.style.transition = 'transform 0.5s ease';
    setTimeout(() => card.style.transition = 'transform 0.1s ease', 500);
});


/* ── Interactive Particle Canvas BG ── */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
function setSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
setSize();
window.addEventListener('resize', setSize);

const COLS = ['rgba(108,99,255,', 'rgba(0,212,255,', 'rgba(0,245,160,'];
let mouse = { x: canvas.width/2, y: canvas.height/2 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

const pts = Array.from({length:100}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-.5)*.5,
    vy: (Math.random()-.5)*.5,
    r: Math.random()*2.5+.5,
    c: COLS[Math.floor(Math.random()*COLS.length)],
    a: Math.random()*.5+.2,
}));

(function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw connecting lines based on mouse proximity to create a "web" effect
    pts.forEach(p => {
        const dx=mouse.x-p.x, dy=mouse.y-p.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<200) { 
            p.vx+=dx/d*.015; p.vy+=dy/d*.015; 
            // Draw line to mouse
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(0, 212, 255, ${0.15 * (1 - d/200)})`;
            ctx.lineWidth = 1; ctx.stroke();
        }
        p.vx*=.98; p.vy*=.98; // friction
        p.x+=p.vx; p.y+=p.vy;
        
        // Wrap around screen
        if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
        if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
        
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.c+p.a+')'; ctx.fill();
    });
    
    // Connect particles to each other
    pts.forEach((p,i)=>{
        for(let j=i+1;j<pts.length;j++){
            const q=pts[j], dx=p.x-q.x, dy=p.y-q.y, d=Math.sqrt(dx*dx+dy*dy);
            if(d<120){
                ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
                ctx.strokeStyle=`rgba(108,99,255,${0.15*(1-d/120)})`; ctx.lineWidth=0.5; ctx.stroke();
            }
        }
    });
    requestAnimationFrame(draw);
})();

/* ── Floating label fix for Django form inputs ── */
document.querySelectorAll('.float-group input').forEach(inp => {
    inp.setAttribute('placeholder', ' ');
    if (inp.value) inp.classList.add('has-val');
    // Add glowing shadow effect when typing
    inp.addEventListener('input', () => {
        if(inp.value.length > 0) {
            inp.style.textShadow = '0 0 10px rgba(255,255,255,0.5)';
        } else {
            inp.style.textShadow = 'none';
        }
    });
});

/* ── Form submit loader ── */
const loginForm = document.getElementById('loginForm');
const loginBtn  = document.getElementById('loginBtn');
if (loginForm) {
    loginForm.addEventListener('submit', function(e) {
        loginBtn.classList.add('loading');
        // Add a slight scale-down animation to the whole card on submit
        card.style.transform = `scale(0.95)`;
    });
}
</script>
</body>
</html>
