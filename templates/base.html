<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6C63FF">
<title>{% block title %}DocVault | AI-Powered DMS{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/theme.css">

<style>
/* Global Modal Z-Index Fix */
.modal { z-index: 99999 !important; }
.modal-backdrop { z-index: 99998 !important; }
</style>

{% block extra_css %}{% endblock %}
</head>
<body>

<!-- Background mesh -->
<div class="bg-mesh"></div>
<canvas id="orbCanvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

<!-- ===== CINEMATIC LOADER (NETFLIX STYLE) ===== -->
<div id="netflix-loader">
  <div class="netflix-logo-container">
    <div class="netflix-letter">D</div>
  </div>
</div>
<style>
#netflix-loader {
  position: fixed; inset: 0; z-index: 9999;
  background: #04060F; display: flex;
  justify-content: center; align-items: center;
  overflow: hidden; pointer-events: none;
  animation: fadeOutLoader 0.8s cubic-bezier(0.8, 0, 0.2, 1) forwards;
  animation-delay: 2.2s;
}
.netflix-logo-container {
  position: relative;
  animation: zoomIntoScreen 2.5s cubic-bezier(0.8, 0, 0.2, 1) forwards;
}
.netflix-letter {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15rem; font-weight: 900;
  background: linear-gradient(135deg, #6C63FF, #00D4FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0;
  transform: scale(0.8);
  animation: letterReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  position: relative;
}
.netflix-letter::after {
  content: ''; position: absolute; inset: -20px;
  background: radial-gradient(circle, rgba(108,99,255,0.4) 0%, transparent 70%);
  z-index: -1; filter: blur(20px);
  animation: glowPulse 2s infinite alternate;
}
@keyframes letterReveal {
  0% { opacity: 0; transform: scale(0.5) translateY(50px) rotateX(-40deg); filter: blur(10px); }
  50% { opacity: 1; transform: scale(1.1) translateY(-10px) rotateX(10deg); filter: blur(0); }
  100% { opacity: 1; transform: scale(1) translateY(0) rotateX(0); }
}
@keyframes zoomIntoScreen {
  0% { transform: scale(1); }
  60% { transform: scale(1); opacity: 1; }
  100% { transform: scale(30); opacity: 0; }
}
@keyframes fadeOutLoader {
  0% { opacity: 1; visibility: visible; }
  100% { opacity: 0; visibility: hidden; }
}
@keyframes glowPulse {
  0% { opacity: 0.3; transform: scale(0.8); }
  100% { opacity: 0.8; transform: scale(1.2); }
}
</style>

<!-- ===== APP ===== -->
<div class="app-container" style="position:relative;z-index:1;">
  {% include 'components/sidebar.html' %}
  <div class="main-content-framework">
    {% include 'components/topbar.html' %}
    <div class="content-body">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<!-- Mobile overlay -->
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;backdrop-filter:blur(4px);"></div>

<!-- Modals (Outside app-container for z-index fixing) -->
{% block modals %}{% endblock %}

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/notifications.js"></script>
<script src="/static/js/physics.js"></script>

<script>
/* Loader replaced with CSS-only cinematic animation */
setTimeout(() => {
  const loader = document.getElementById('netflix-loader');
  if(loader) loader.style.display = 'none';
}, 3500);

/* ── Mobile sidebar toggle ── */
const overlay = document.getElementById('sidebarOverlay');
const sidebar = document.querySelector('.sidebar-framework');
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.style.display = 'none';
});
document.addEventListener('sidebarOpen', () => { overlay.style.display = 'block'; });
document.addEventListener('sidebarClose', () => { overlay.style.display = 'none'; });

/* ── Dark/Light mode persist ── */
const savedTheme = localStorage.getItem('dvTheme');
if (savedTheme === 'light') applyLightMode();

function applyLightMode() {
  document.documentElement.style.setProperty('--bg', '#F1F5F9');
  document.documentElement.style.setProperty('--bg-surface', '#fff');
  document.documentElement.style.setProperty('--bg-card', 'rgba(255,255,255,.95)');
  document.documentElement.style.setProperty('--bg-sidebar', 'rgba(10,14,30,.97)');
  document.documentElement.style.setProperty('--text', '#0F172A');
  document.documentElement.style.setProperty('--text-dim', '#475569');
}
function applyDarkMode() {
  document.documentElement.style.setProperty('--bg', '#04060F');
  document.documentElement.style.setProperty('--bg-surface', '#080C1A');
  document.documentElement.style.setProperty('--bg-card', 'rgba(12,18,40,.75)');
  document.documentElement.style.setProperty('--bg-sidebar', 'rgba(6,10,24,.95)');
  document.documentElement.style.setProperty('--text', '#E2E8F0');
  document.documentElement.style.setProperty('--text-dim', '#64748B');
}
window.toggleTheme = function() {
  const isDark = localStorage.getItem('dvTheme') !== 'light';
  if (isDark) { applyLightMode(); localStorage.setItem('dvTheme','light'); }
  else { applyDarkMode(); localStorage.setItem('dvTheme','dark'); }
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
};
</script>

{% block extra_js %}{% endblock %}

{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  {% for message in messages %}
  if (window.ToastEngine) {
    window.ToastEngine.show("{{ message|escapejs }}", "{{ message.tags|default:'' }}");
  }
  {% endfor %}
});
</script>
{% endif %}
</body>
</html>
